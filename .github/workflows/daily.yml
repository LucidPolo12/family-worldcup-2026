name: Daily World Cup update

# Runs every morning ~8am Central, plus a manual "Run workflow" button.
on:
  schedule:
    - cron: "0 13 * * *"   # ~8:00 AM CT — score yesterday's games
    - cron: "0 18 * * *"   # ~1:00 PM CT — pull picks before afternoon kickoffs
    - cron: "0 23 * * *"   # ~6:00 PM CT — pull picks before evening kickoffs
  workflow_dispatch: {}

permissions:
  contents: write          # allow the workflow to commit results back to the repo

# Share one queue with the fast picks job so the two never push at the same time.
concurrency:
  group: wc-publish
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openpyxl

      - name: Ingest family-submitted picks
        env:
          PICKS_CSV_URL: ${{ secrets.PICKS_CSV_URL }}
        run: python fetch_picks.py || echo "picks ingest skipped this run"

      - name: Enter finished group-stage scores
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python update_scores.py || echo "score fetch skipped this run"

      - name: Rebuild data.json (standings)
        run: python regenerate_data.py

      - name: Refresh win/draw/win odds (non-fatal if it hiccups)
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python fetch_odds.py || echo "odds refresh skipped this run"

      - name: Commit & push if anything changed
        run: |
          git config user.name "WC Auto Updater"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          [ -f results.json ] && git add results.json || true
          [ -f picks.json ] && git add picks.json || true
          if git diff --staged --quiet; then
            echo "No changes today."
          else
            git commit -m "Daily auto-update: scores, standings & odds"
            git pull --rebase origin main || true
            git push
          fi
