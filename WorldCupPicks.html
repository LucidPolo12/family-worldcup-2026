<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Family World Cup 2026 — Make Your Picks</title>
<style>
  :root{--green:#1a8a4a;--green2:#15703c;--bg:#f4f6f8;--card:#fff;--line:#e3e7eb;--ink:#1c2430;--muted:#6b7785;--gold:#f5b301;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);padding-bottom:96px}
  header{background:linear-gradient(135deg,#1a8a4a,#0e5c30);color:#fff;padding:18px 16px 16px;position:sticky;top:0;z-index:5;box-shadow:0 2px 10px rgba(0,0,0,.12)}
  header h1{margin:0 0 2px;font-size:19px;font-weight:800;letter-spacing:.2px}
  header p{margin:0;font-size:12.5px;opacity:.9}
  .wrap{max-width:560px;margin:0 auto;padding:14px}
  .namebox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:12px}
  .namebox label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  select,input[type=text]{width:100%;margin-top:6px;padding:12px;border:1.5px solid var(--line);border-radius:10px;font-size:16px;background:#fff;color:var(--ink)}
  .chips{display:flex;gap:8px;overflow-x:auto;padding:4px 0 10px;-webkit-overflow-scrolling:touch}
  .chip{flex:0 0 auto;padding:8px 13px;border-radius:999px;border:1.5px solid var(--line);background:#fff;font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap}
  .chip.active{background:var(--green);border-color:var(--green);color:#fff}
  .match{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}
  .match.picked{border-color:var(--green);box-shadow:0 0 0 1.5px var(--green) inset}
  .meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:9px;font-weight:600}
  .knk{color:#b06a00}
  .row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
  .team{font-size:15px;font-weight:700;line-height:1.2}
  .team.away{text-align:right}
  .stepper{display:flex;align-items:center;gap:6px}
  .stepper.away{flex-direction:row-reverse}
  .sbtn{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--line);background:#f7f9fb;font-size:20px;font-weight:700;color:var(--green2);display:flex;align-items:center;justify-content:center;user-select:none}
  .sbtn:active{background:var(--green);color:#fff}
  .sval{min-width:30px;text-align:center;font-size:20px;font-weight:800;color:var(--ink)}
  .sval.empty{color:#c2cad2}
  .vs{font-size:12px;color:var(--muted);font-weight:700;text-align:center}
  .bar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);padding:12px 14px calc(12px + env(safe-area-inset-bottom));box-shadow:0 -3px 14px rgba(0,0,0,.08)}
  .bar .inner{max-width:560px;margin:0 auto;display:flex;gap:10px;align-items:center}
  .count{font-size:13px;color:var(--muted);font-weight:700;white-space:nowrap}
  .btn{flex:1;padding:14px;border:none;border-radius:12px;background:var(--green);color:#fff;font-size:16px;font-weight:800}
  .btn:active{background:var(--green2)}
  .btn.sec{flex:0 0 auto;background:#eef1f4;color:var(--ink);padding:14px 14px}
  .modal{position:fixed;inset:0;background:rgba(20,28,38,.55);display:none;align-items:flex-end;z-index:20}
  .modal.show{display:flex}
  .sheet{background:#fff;width:100%;max-width:560px;margin:0 auto;border-radius:18px 18px 0 0;padding:16px 16px calc(16px + env(safe-area-inset-bottom))}
  .sheet h3{margin:0 0 8px;font-size:16px}
  .out{width:100%;height:180px;border:1.5px solid var(--line);border-radius:12px;padding:12px;font:14px/1.5 ui-monospace,Menlo,Consolas,monospace;resize:none;background:#fafbfc;color:var(--ink)}
  .sheet .acts{display:flex;gap:10px;margin-top:12px}
  .hint{font-size:12px;color:var(--muted);margin:8px 2px 0}
  .empty-note{text-align:center;color:var(--muted);font-size:14px;padding:30px 10px}
  .match.locked{opacity:.7;background:#f4f6f8;border-color:var(--line)}
  .match.locked .sbtn{display:none}
  .lockmsg{font-size:11px;color:#b06a00;font-weight:800;white-space:nowrap}
  .lockpill{font-size:10px;font-weight:800;color:#b06a00;background:#fff4e0;border:1px solid #f3dca6;border-radius:999px;padding:1px 7px;margin-left:6px}
</style>
</head>
<body>
<header>
  <h1>🏆 Family World Cup 2026</h1>
  <p>Tap the scores you think each game will end. Then hit <b>Generate</b> and send it to Marco. Pick as many or as few as you like!</p>
</header>
<div class="wrap">
  <div class="namebox">
    <label for="name">Who are you?</label>
    <select id="name">
      <option value="">— choose your name —</option>
      <option>Ewan</option><option>Nana</option><option>Emrys</option><option>Nonno</option>
      <option>Nonna</option><option>Boompa</option><option>Xavier</option><option>Autumn</option><option>River</option>
      <option value="__other">Someone else…</option>
    </select>
    <input type="text" id="othername" placeholder="Type your name" style="display:none">
  </div>
  <div class="chips" id="chips"></div>
  <div id="list"></div>
</div>

<div class="bar">
  <div class="inner">
    <span class="count" id="count">0 picked</span>
    <button class="btn sec" id="clearBtn">Clear</button>
    <button class="btn" id="genBtn">Generate ✅</button>
  </div>
</div>

<div class="modal" id="modal">
  <div class="sheet">
    <h3>Your picks — copy &amp; send to Marco 📋</h3>
    <textarea class="out" id="out" readonly></textarea>
    <p class="hint">Tip: tap <b>Copy</b>, then paste into the family chat or text to Marco.</p>
    <div class="acts">
      <button class="btn sec" id="closeBtn">Close</button>
      <button class="btn" id="copyBtn">Copy 📋</button>
    </div>
  </div>
</div>

const KEY = "wc2026picks_v1";
let state = {name:"", scores:{}}; // scores[n] = {h:null|num, a:null|num}
try{ const s=localStorage.getItem(KEY); if(s) state=JSON.parse(s); }catch(e){}

function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }
function isKnock(f){ return f.stage && f.stage.indexOf("Group")<0; }
// Kickoff handling: parse the ET kickoff into an absolute instant, show in local time, lock at kickoff.
function koInstant(dateStr, ko){
  const m=(ko||'').match(/(\d+):(\d+)\s*(AM|PM)/i);
  if(!m) return null;
  let hh=(+m[1])%12; if(/pm/i.test(m[3])) hh+=12; const mm=+m[2];
  let day=dateStr;
  if(hh<6){ const t=new Date(dateStr+"T12:00:00Z"); t.setUTCDate(t.getUTCDate()+1); day=t.toISOString().slice(0,10); }
  const p=x=>String(x).padStart(2,'0');
  return new Date(day+"T"+p(hh)+":"+p(mm)+":00-04:00");
}
function startTime(f){ return koInstant(f.date, f.ko); }
function isStarted(f){ const t=startTime(f); return t ? Date.now()>=t.getTime() : false; }
function koLocal(f){ const t=startTime(f); if(!t) return f.ko||''; try{ return t.toLocaleTimeString([], {hour:'numeric',minute:'2-digit',timeZoneName:'short'}); }catch(e){ return f.ko||''; } }

// Build date filter chips
const dates = [...new Set(FIX.map(f=>f.date))];
function fmtDate(d){ const o=new Date(d+"T12:00:00"); return o.toLocaleDateString(undefined,{weekday:"short",month:"short",day:"numeric"}); }
let activeFilter = "all";

const chipsEl = document.getElementById("chips");
function renderChips(){
  let html = '<div class="chip '+(activeFilter==="all"?"active":"")+'" data-f="all">All ('+FIX.length+')</div>';
  dates.forEach(d=>{ html += '<div class="chip '+(activeFilter===d?"active":"")+'" data-f="'+d+'">'+fmtDate(d)+'</div>'; });
  chipsEl.innerHTML = html;
  chipsEl.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{activeFilter=c.dataset.f;renderChips();renderList();});
}

const listEl = document.getElementById("list");
function val(n,side){ return (state.scores[n]&&state.scores[n][side]!=null)?state.scores[n][side]:null; }
function renderList(){
  const items = FIX.filter(f=>activeFilter==="all"||f.date===activeFilter);
  if(!items.length){ listEl.innerHTML='<div class="empty-note">No games here.</div>'; return; }
  listEl.innerHTML = items.map(f=>{
    const hv=val(f.n,"h"), av=val(f.n,"a");
    const picked = hv!=null && av!=null;
    const locked = isStarted(f);
    const stage = isKnock(f) ? '<span class="knk">'+f.stage+'</span>' : ('Group '+(f.grp||""));
    const sb=(s,d,sym)=> locked? '' : '<div class="sbtn" data-n="'+f.n+'" data-s="'+s+'" data-d="'+d+'">'+sym+'</div>';
    return '<div class="match '+(picked?"picked":"")+(locked?" locked":"")+'" id="m'+f.n+'">'+
      '<div class="meta"><span>Match '+f.n+' · '+stage+(locked?'<span class="lockpill">🔒 LOCKED</span>':'')+'</span><span>'+fmtDate(f.date)+' · '+koLocal(f)+'</span></div>'+
      '<div class="row">'+
        '<div class="team">'+f.h+'</div>'+
        '<div class="stepper">'+ sb('h','-1','−') +
          '<div class="sval '+(hv==null?"empty":"")+'" id="v'+f.n+'h">'+(hv==null?"–":hv)+'</div>'+
          sb('h','1','+') +
        '</div>'+
        '<div class="vs">—</div>'+
      '</div>'+
      '<div class="row" style="margin-top:8px">'+
        '<div>'+(locked?'<span class="lockmsg">Kicked off — pick locked</span>':'')+'</div>'+
        '<div class="stepper away">'+ sb('a','-1','−') +
          '<div class="sval '+(av==null?"empty":"")+'" id="v'+f.n+'a">'+(av==null?"–":av)+'</div>'+
          sb('a','1','+') +
        '</div>'+
        '<div class="team away">'+f.a+'</div>'+
      '</div>'+
    '</div>';
  }).join("");
  listEl.querySelectorAll(".sbtn").forEach(b=>b.onclick=()=>step(+b.dataset.n,b.dataset.s,+b.dataset.d));
  updateCount();
}
function step(n,side,d){
  const fx=FIX.find(x=>x.n===n);
  if(fx && isStarted(fx)) return; // locked at kickoff
  if(!state.scores[n]) state.scores[n]={h:null,a:null};
  let v=state.scores[n][side];
  if(d>0){ v = (v==null)?0:v+1; if(v>20)v=20; }
  else { v = (v==null)?null:(v<=0?null:v-1); }
  state.scores[n][side]=v;
  const el=document.getElementById("v"+n+side);
  el.textContent = v==null?"–":v; el.classList.toggle("empty",v==null);
  const f=FIX.find(x=>x.n===n);
  const picked = state.scores[n].h!=null && state.scores[n].a!=null;
  document.getElementById("m"+n).classList.toggle("picked",picked);
  save(); updateCount();
}
function pickedList(){
  return FIX.filter(f=>{const s=state.scores[f.n];return s&&s.h!=null&&s.a!=null;});
}
function sendable(){ return pickedList().filter(f=>!isStarted(f)); }
function updateCount(){
  const n=sendable().length, lk=pickedList().length-n;
  document.getElementById("count").textContent = n+" to send"+(lk>0?" · "+lk+" locked":"");
}

// Name handling
const nameSel=document.getElementById("name"), otherInp=document.getElementById("othername");
if(state.name){
  const known=["Ewan","Nana","Emrys","Nonno","Nonna","Boompa","Xavier","Autumn","River"];
  if(known.includes(state.name)){ nameSel.value=state.name; }
  else { nameSel.value="__other"; otherInp.style.display="block"; otherInp.value=state.name; }
}
nameSel.onchange=()=>{
  if(nameSel.value==="__other"){ otherInp.style.display="block"; state.name=otherInp.value.trim(); }
  else { otherInp.style.display="none"; state.name=nameSel.value; }
  save();
};
otherInp.oninput=()=>{ state.name=otherInp.value.trim(); save(); };

// Generate
function buildText(){
  const picks=sendable();
  const who = state.name || "(no name!)";
  let lines = ["\uD83C\uDFC6 Family WC Picks \u2014 "+who];
  if(!picks.length){ lines.push("(no upcoming games picked yet)"); }
  picks.forEach(f=>{ lines.push("M"+f.n+": "+f.h+" "+state.scores[f.n].h+"-"+state.scores[f.n].a+" "+f.a); });
  return lines.join("\n");
}
const modal=document.getElementById("modal"), out=document.getElementById("out");
document.getElementById("genBtn").onclick=()=>{
  if(!state.name){ alert("Pick your name at the top first! \uD83D\uDE0A"); window.scrollTo({top:0,behavior:"smooth"}); return; }
  if(!sendable().length){ alert("Tap some scores for upcoming games first, then Generate. (Games that already kicked off are locked and won't be sent.)"); return; }
  out.value=buildText(); modal.classList.add("show");
};
document.getElementById("closeBtn").onclick=()=>modal.classList.remove("show");
document.getElementById("copyBtn").onclick=()=>{
  out.select(); out.setSelectionRange(0,99999);
  let ok=false;
  try{ ok=document.execCommand("copy"); }catch(e){}
  if(navigator.clipboard){ navigator.clipboard.writeText(out.value).then(()=>{},()=>{}); ok=true; }
  const b=document.getElementById("copyBtn"); const t=b.textContent; b.textContent="Copied! \u2705";
  setTimeout(()=>b.textContent=t,1400);
};
document.getElementById("clearBtn").onclick=()=>{
  if(confirm("Clear all your picks?")){ state.scores={}; save(); renderList(); }
};

renderChips(); renderList();
// Re-render every 30s so games lock automatically the moment they kick off.
setInterval(renderList, 30000);
</script>
