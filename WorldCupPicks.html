<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Family World Cup 2026 — Make Your Picks</title>
<style>
  :root{--green:#1a8a4a;--green2:#15703c;--bg:#f4f6f8;--card:#fff;--line:#e3e7eb;--ink:#1c2430;--muted:#6b7785;--gold:#f5b301;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);padding-bottom:96px}
  header{background:linear-gradient(135deg,#1a8a4a,#0e5c30);color:#fff;padding:18px 16px 16px;position:sticky;top:0;z-index:5;box-shadow:0 2px 10px rgba(0,0,0,.12)}
  header h1{margin:0 0 2px;font-size:19px;font-weight:800;letter-spacing:.2px}
  header p{margin:0;font-size:12.5px;opacity:.9}
  .wrap{max-width:560px;margin:0 auto;padding:14px}
  .namebox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:12px}
  .namebox label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  select,input[type=text]{width:100%;margin-top:6px;padding:12px;border:1.5px solid var(--line);border-radius:10px;font-size:16px;background:#fff;color:var(--ink)}
  .chips{display:flex;gap:8px;overflow-x:auto;padding:4px 0 10px;-webkit-overflow-scrolling:touch}
  .chip{flex:0 0 auto;padding:8px 13px;border-radius:999px;border:1.5px solid var(--line);background:#fff;font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap}
  .chip.active{background:var(--green);border-color:var(--green);color:#fff}
  .match{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}
  .match.picked{border-color:var(--green);box-shadow:0 0 0 1.5px var(--green) inset}
  .meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:9px;font-weight:600}
  .knk{color:#b06a00}
  .row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
  .team{font-size:15px;font-weight:700;line-height:1.2}
  .team.away{text-align:right}
  .stepper{display:flex;align-items:center;gap:6px}
  .stepper.away{flex-direction:row-reverse}
  .sbtn{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--line);background:#f7f9fb;font-size:20px;font-weight:700;color:var(--green2);display:flex;align-items:center;justify-content:center;user-select:none}
  .sbtn:active{background:var(--green);color:#fff}
  .sval{min-width:30px;text-align:center;font-size:20px;font-weight:800;color:var(--ink)}
  .sval.empty{color:#c2cad2}
  .vs{font-size:12px;color:var(--muted);font-weight:700;text-align:center}
  .bar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);padding:12px 14px calc(12px + env(safe-area-inset-bottom));box-shadow:0 -3px 14px rgba(0,0,0,.08)}
  .bar .inner{max-width:560px;margin:0 auto;display:flex;gap:10px;align-items:center}
  .count{font-size:13px;color:var(--muted);font-weight:700;white-space:nowrap}
  .btn{flex:1;padding:14px;border:none;border-radius:12px;background:var(--green);color:#fff;font-size:16px;font-weight:800}
  .btn:active{background:var(--green2)}
  .btn.sec{flex:0 0 auto;background:#eef1f4;color:var(--ink);padding:14px 14px}
  .modal{position:fixed;inset:0;background:rgba(20,28,38,.55);display:none;align-items:flex-end;z-index:20}
  .modal.show{display:flex}
  .sheet{background:#fff;width:100%;max-width:560px;margin:0 auto;border-radius:18px 18px 0 0;padding:16px 16px calc(16px + env(safe-area-inset-bottom))}
  .sheet h3{margin:0 0 8px;font-size:16px}
  .out{width:100%;height:180px;border:1.5px solid var(--line);border-radius:12px;padding:12px;font:14px/1.5 ui-monospace,Menlo,Consolas,monospace;resize:none;background:#fafbfc;color:var(--ink)}
  .sheet .acts{display:flex;gap:10px;margin-top:12px}
  .hint{font-size:12px;color:var(--muted);margin:8px 2px 0}
  .empty-note{text-align:center;color:var(--muted);font-size:14px;padding:30px 10px}
  .match.locked{opacity:.7;background:#f4f6f8;border-color:var(--line)}
  .match.locked .sbtn{display:none}
  .lockmsg{font-size:11px;color:#b06a00;font-weight:800;white-space:nowrap}
  .lockpill{font-size:10px;font-weight:800;color:#b06a00;background:#fff4e0;border:1px solid #f3dca6;border-radius:999px;padding:1px 7px;margin-left:6px}
  .advsec{margin-top:10px;border-top:1px dashed var(--line);padding-top:8px}
  .advcap{font-size:11.5px;color:var(--muted);line-height:1.45}
  .advauto{margin-top:6px;font-size:12.5px;font-weight:700;color:#0a7d3c}
  .advpen{margin-top:8px}
  .advq{font-size:12.5px;font-weight:800;color:#b06a00;margin-bottom:6px}
  .advneed{font-size:10px;font-weight:800;color:#fff;background:#c0392b;border-radius:999px;padding:1px 7px;margin-left:6px;vertical-align:middle}
  .advbtns{display:flex;gap:8px}
  .advopt{flex:1;text-align:center;padding:9px 8px;border:1.5px solid var(--line);background:#fff;border-radius:11px;font-size:13px;font-weight:800;color:var(--muted);cursor:pointer}
  .advopt.on{background:#fff4e0;border-color:#e0a500;color:#8a5200;box-shadow:0 0 0 2px rgba(224,165,0,.25)}
  .advopt.off{opacity:.55}
  .tabbar{display:flex;gap:8px;margin-bottom:14px}
  .tabbtn{flex:1;padding:12px 8px;border:1.5px solid var(--line);background:#fff;border-radius:12px;font-size:14px;font-weight:800;color:var(--muted)}
  .tabbtn.active{background:var(--green);border-color:var(--green);color:#fff}
  .pintro{font-size:13px;color:var(--muted);line-height:1.5;margin:0 2px 14px}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px}
  .pcard.lockedrow{opacity:.6;background:#f4f6f8}
  .pl{font-size:12px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .pl .medal{font-size:18px}
  .pcard select:disabled{background:#eef1f4;color:#9aa6b2;cursor:not-allowed}
  .openpill{font-size:10px;font-weight:800;color:#0a7d3c;background:#e7f6ec;border:1px solid #b9e3c6;border-radius:999px;padding:1px 8px}
  .soonpill{font-size:10px;font-weight:800;color:#b06a00;background:#fff4e0;border:1px solid #f3dca6;border-radius:999px;padding:1px 8px}
  .podiumNote{font-size:12px;color:var(--muted);line-height:1.5;margin:10px 2px 14px}
</style>
</head>
<body>
<header>
  <h1>🏆 Family World Cup 2026</h1>
  <p>Tap the scores for each game, or use the <b>🏆 Champion &amp; Podium</b> tab to call the final four. Then hit <b>Submit</b> to enter your pick.</p>
</header>
<div class="wrap">
  <div class="namebox">
    <label for="name">Who are you?</label>
    <select id="name">
      <option value="">— choose your name —</option>
      <option>Ewan</option><option>Nana</option><option>Emrys</option><option>Nonno</option>
      <option>Nonna</option><option>Boompa</option><option>Xavier</option><option>Autumn</option><option>River</option>
      <option value="__other">Someone else…</option>
    </select>
    <input type="text" id="othername" placeholder="Type your name" style="display:none">
  </div>
  <div class="tabbar">
    <button class="tabbtn active" id="tabMatches" data-tab="matches">⚽ Match Picks</button>
    <button class="tabbtn" id="tabPodium" data-tab="podium">🏆 Champion &amp; Podium</button>
    <button class="tabbtn" id="tabGoldenBoot" data-tab="goldenboot">🥇 Golden Boot</button>
  </div>
  <div id="panelMatches">
    <div class="chips" id="chips"></div>
    <div id="list"></div>
  </div>
  <div id="panelPodium" style="display:none"></div>
  <div id="panelGoldenBoot" style="display:none"></div>
</div>

<div class="bar">
  <div class="inner">
    <span class="count" id="count">0 picked</span>
    <button class="btn sec" id="clearBtn">Clear</button>
    <button class="btn" id="genBtn">Submit ✅</button>
  </div>
</div>

<div class="modal" id="modal">
  <div class="sheet">
    <h3 id="sheetTitle">Your picks 📋</h3>
    <textarea class="out" id="out" readonly></textarea>
    <p class="hint" id="sheetHint">Tip: tap <b>Copy</b> to keep a backup.</p>
    <div class="acts">
      <button class="btn sec" id="closeBtn">Close</button>
      <button class="btn" id="copyBtn">Copy 📋</button>
    </div>
  </div>
</div>

    '</div>';
  }).join("");
  listEl.querySelectorAll(".sbtn").forEach(b=>b.onclick=()=>step(+b.dataset.n,b.dataset.s,+b.dataset.d));
  bindAdv();
  updateCount();
}
// ---- Knockout advance / penalty-winner UI -------------------------------------
// Score field = final score after all playing time (penalties excluded). If the
// predicted score is a TIE, the player must pick who advances on penalties; if
// it's decisive, the higher-scoring team advances automatically.
function advInner(f, locked){
  const d=disp(f), max=KO_MAX[f.stage]||12;
  const hv=val(f.n,"h"), av=val(f.n,"a"), picked=hv!=null&&av!=null;
  const cap='<div class="advcap">⚽ Final score after all playing time — 90 min or extra time; <b>penalty kicks not counted</b>. Worth up to <b>'+max+' pts</b> (5–25 advance + score bonus).</div>';
  if(!picked) return cap;
  if(hv!==av){
    const w = hv>av ? d.h : d.a;
    return cap+'<div class="advauto">✅ <b>'+w+'</b> will automatically be selected to advance.</div>';
  }
  // tied score -> require a penalty-winner choice
  const sel=state.adv[f.n];
  const need = locked ? '' : (sel? '' : '<span class="advneed">required</span>');
  const btn=(side,team)=> locked
      ? '<div class="advopt '+(sel===side?'on':'off')+'">'+team+'</div>'
      : '<div class="advopt '+(sel===side?'on':'')+'" data-adv="'+f.n+'" data-side="'+side+'">'+team+'</div>';
  return cap+'<div class="advpen"><div class="advq">🥅 Who advances on penalties? '+need+'</div>'+
    '<div class="advbtns">'+btn('H',d.h)+btn('A',d.a)+'</div></div>';
}
function renderAdv(n){ const f=FIX.find(x=>x.n===n); const box=document.getElementById("adv"+n);
  if(f&&box){ box.innerHTML=advInner(f,isStarted(f)); bindAdv(); } }
function bindAdv(){ listEl.querySelectorAll(".advopt[data-adv]").forEach(b=>b.onclick=()=>setAdv(+b.dataset.adv,b.dataset.side)); }
function setAdv(n,side){ const f=FIX.find(x=>x.n===n); if(f&&isStarted(f)) return;
  state.adv[n]=side; save(); renderAdv(n); }
function step(n,side,d){
  const fx=FIX.find(x=>x.n===n);
  if(fx && isStarted(fx)) return; // locked at kickoff
  if(!state.scores[n]) state.scores[n]={h:null,a:null};
  let v=state.scores[n][side];
  if(d>0){ v = (v==null)?0:v+1; if(v>20)v=20; }
  else { v = (v==null)?null:(v<=0?null:v-1); }
  state.scores[n][side]=v;
  const el=document.getElementById("v"+n+side);
  el.textContent = v==null?"–":v; el.classList.toggle("empty",v==null);
  const f=FIX.find(x=>x.n===n);
  const picked = state.scores[n].h!=null && state.scores[n].a!=null;
  document.getElementById("m"+n).classList.toggle("picked",picked);
  if(f && isKnock(f)) renderAdv(n);   // refresh auto-advance / penalty selector
  save(); updateCount();
}
function pickedList(){
  return FIX.filter(f=>{const s=state.scores[f.n];return s&&s.h!=null&&s.a!=null;});
}
function sendable(){ return pickedList().filter(f=>!isStarted(f)); }
function updateCount(){
  const n=sendable().length, lk=pickedList().length-n;
  document.getElementById("count").textContent = n+" to send"+(lk>0?" · "+lk+" locked":"");
}

// Name handling
const nameSel=document.getElementById("name"), otherInp=document.getElementById("othername");
if(state.name){
  const known=["Ewan","Nana","Emrys","Nonno","Nonna","Boompa","Xavier","Autumn","River"];
  if(known.includes(state.name)){ nameSel.value=state.name; }
  else { nameSel.value="__other"; otherInp.style.display="block"; otherInp.value=state.name; }
}
nameSel.onchange=()=>{
  if(nameSel.value==="__other"){ otherInp.style.display="block"; state.name=otherInp.value.trim(); }
  else { otherInp.style.display="none"; state.name=nameSel.value; }
  save();
};
otherInp.oninput=()=>{ state.name=otherInp.value.trim(); save(); };

// Generate
function buildText(){
  const picks=sendable();
  const who = state.name || "(no name!)";
  let lines = ["\uD83C\uDFC6 Family WC Picks \u2014 "+who];
  if(!picks.length){ lines.push("(no upcoming games picked yet)"); }
  picks.forEach(f=>{ const d=disp(f); const s=state.scores[f.n];
    let line="M"+f.n+": "+d.h+" "+s.h+"-"+s.a+" "+d.a;
    if(isKnock(f) && s.h===s.a){ const w=state.adv[f.n]==="H"?d.h:(state.adv[f.n]==="A"?d.a:null);
      line += w ? " ("+w+" advance on pens)" : " (⚠ pick who advances!)"; }
    lines.push(line); });
  return lines.join("\n");
}
const modal=document.getElementById("modal"), out=document.getElementById("out");
function submitPicks(){
  if(!state.name){ alert("Pick your name at the top first! \uD83D\uDE0A"); window.scrollTo({top:0,behavior:"smooth"}); return; }
  const picks=sendable();
  if(!picks.length){ alert("Tap some scores for upcoming games first. (Games that already kicked off are locked.)"); return; }
  // Knockout tie must name a penalty winner before sending.
  const missing=picks.filter(f=>isKnock(f) && state.scores[f.n].h===state.scores[f.n].a && !state.adv[f.n]);
  if(missing.length){ const f=missing[0]; const d=disp(f);
    alert("You predicted a tie for Match "+f.n+" ("+d.h+" vs "+d.a+"). Tap who advances on penalties before submitting. 🥅");
    const el=document.getElementById("m"+f.n); if(el&&el.scrollIntoView) el.scrollIntoView({behavior:"smooth",block:"center"}); return; }
  const payload={ name: state.name, picks: picks.map(f=>{ const o={n:f.n, ph:state.scores[f.n].h, pa:state.scores[f.n].a};
    if(isKnock(f) && state.scores[f.n].h===state.scores[f.n].a) o.adv=state.adv[f.n]||""; return o; }) };
  const live = SCRIPT_URL && SCRIPT_URL.indexOf("PASTE_")<0;
  if(live){
    fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)}).then(function(){},function(){});
    document.getElementById("sheetTitle").textContent="Picks submitted! \u2705";
    document.getElementById("sheetHint").innerHTML="Sent straight to the family pool \u2014 change them any time before kickoff. A backup copy is below if you want it.";
  } else {
    document.getElementById("sheetTitle").textContent="Your picks \u2014 copy & send to Marco \uD83D\uDCCB";
    document.getElementById("sheetHint").innerHTML="Tip: tap <b>Copy</b>, then paste into the family chat or text to Marco.";
  }
  out.value=buildText(); modal.classList.add("show");
}
document.getElementById("genBtn").onclick=submitPicks;
document.getElementById("closeBtn").onclick=()=>modal.classList.remove("show");
document.getElementById("copyBtn").onclick=()=>{
  out.select(); out.setSelectionRange(0,99999);
  let ok=false;
  try{ ok=document.execCommand("copy"); }catch(e){}
  if(navigator.clipboard){ navigator.clipboard.writeText(out.value).then(()=>{},()=>{}); ok=true; }
  const b=document.getElementById("copyBtn"); const t=b.textContent; b.textContent="Copied! \u2705";
  setTimeout(()=>b.textContent=t,1400);
};
document.getElementById("clearBtn").onclick=()=>{
  if(confirm("Clear all your picks?")){ state.scores={}; save(); renderList(); }
};

// ===== Champion & Podium tab =====
// 48 tournament teams, pulled straight from the group-stage fixtures.
// Teams eliminated as of beginning of 7/2/26 are removed from picks:
// (a) the 16 teams that did not advance out of the group stage at all, plus
// (b) the 10 more knocked out in Round of 32 so far (matches 73-82 decided).
const ELIMINATED_TEAMS = new Set([
  // group-stage eliminations (did not reach Round of 32)
  "South Korea","Czechia","Qatar","Haiti","Scotland","Türkiye","Curaçao","Tunisia",
  "New Zealand","Iran","Saudi Arabia","Uruguay","Iraq","Jordan","Uzbekistan","Panama",
  // Round of 32 eliminations (matches 73-82)
  "South Africa","Germany","Netherlands","Japan","Sweden","Ivory Coast","Ecuador","DR Congo","Bosnia and Herzegovina","Senegal"
]);
const TEAMS = [...new Set(FIX.filter(f=>f.stage==="Group Stage").flatMap(f=>[f.h,f.a]))].filter(t=>!ELIMINATED_TEAMS.has(t)).sort((a,b)=>a.localeCompare(b));
if(!state.final4) state.final4 = {champ:"",run:"",third:"",fourth:""};
// Deadlines. All four picks are editable now and lock at the first Quarterfinal kickoff.
const PODIUM_OPEN = new Date("2026-06-11T00:00:00-05:00"); // open from the start of the tournament
const PODIUM_LOCK = new Date("2026-07-09T16:00:00-04:00"); // first QF kickoff (Thu Jul 9, 4:00 PM ET)
const OPEN_LABEL = "now";
const LOCK_LABEL = "Thu, Jul 9 · 4:00 PM ET (Quarterfinal kickoff)";
function podiumPhase(){ const now=Date.now(); if(now>=PODIUM_LOCK.getTime()) return "locked"; if(now>=PODIUM_OPEN.getTime()) return "open"; return "pre"; }

const panelPodium = document.getElementById("panelPodium");
function teamOptions(selected, exclude){
  let h='<option value="">— pick a team —</option>';
  TEAMS.forEach(t=>{ if(exclude.has(t) && t!==selected) return; h+='<option'+(t===selected?' selected':'')+'>'+t+'</option>'; });
  return h;
}
function podRow(key,label,medal,disabled,note){
  const f4=state.final4;
  const excl=new Set([f4.champ,f4.run,f4.third,f4.fourth].filter(Boolean)); excl.delete(f4[key]);
  return '<div class="pcard'+(disabled?' lockedrow':'')+'">'+
    '<div class="pl"><span class="medal">'+medal+'</span> '+label+(note||'')+'</div>'+
    '<select data-key="'+key+'"'+(disabled?' disabled':'')+'>'+teamOptions(f4[key],excl)+'</select>'+
  '</div>';
}
function renderPodium(){
  const phase=podiumPhase();
  const champLocked = phase==="locked";
  const podiumDisabled = phase!=="open"; // runner-up/3rd/4th editable only in the open window
  let podNote;
  if(phase==="pre") podNote=' <span class="soonpill">Opens '+OPEN_LABEL+'</span>';
  else if(phase==="open") podNote=' <span class="openpill">OPEN</span>';
  else podNote=' <span class="soonpill">🔒 LOCKED</span>';
  const champNote = champLocked ? ' <span class="soonpill">🔒 LOCKED</span>' : ' <span class="openpill">OPEN NOW</span>';
  let html='';
  html+='<div class="pintro">Call the <b>final four</b> of the tournament for big bonus points — <b>exact finish only</b>: 🥇 Champion <b>50</b> · 🥈 Runner-up <b>35</b> · 🥉 3rd <b>20</b> · 🏅 4th <b>10</b> (up to 115!). All four — <b>Champion, Runner-up, 3rd &amp; 4th</b> — are open to pick and change right now, so you can keep adjusting your path as teams advance. They all lock at <b>'+LOCK_LABEL+'</b> — change them as often as you like until then.</div>';
  html+=podRow('champ','Champion'+champNote,'🥇',champLocked,'');
  html+=podRow('run','Runner-up'+podNote,'🥈',podiumDisabled,'');
  html+=podRow('third','3rd place'+podNote,'🥉',podiumDisabled,'');
  html+=podRow('fourth','4th place'+podNote,'🏅',podiumDisabled,'');
  html+='<div class="podiumNote">A team can only finish in one spot, and you only score points for the <b>exact</b> finishing place. '+(champLocked?'These picks are now locked. ':'')+'</div>';
  if(!champLocked) html+='<button class="btn" id="podiumSubmit" style="width:100%">Submit ✅</button>';
  panelPodium.innerHTML=html;
  panelPodium.querySelectorAll("select[data-key]").forEach(sel=>sel.onchange=()=>{ state.final4[sel.dataset.key]=sel.value; save(); renderPodium(); });
  const ps=document.getElementById("podiumSubmit"); if(ps) ps.onclick=submitPodium;
}
function buildPodiumText(){
  const f4=state.final4, who=state.name||"(no name!)";
  return ["🏆 Family WC — Final Four — "+who,
    "🥇 Champion: "+(f4.champ||"—"),
    "🥈 Runner-up: "+(f4.run||"—"),
    "🥉 3rd place: "+(f4.third||"—"),
    "🏅 4th place: "+(f4.fourth||"—")].join("\n");
}
function submitPodium(){
  if(!state.name){ alert("Pick your name at the top first! 😊"); window.scrollTo({top:0,behavior:"smooth"}); return; }
  const f4=state.final4;
  if(!f4.champ){ alert("Pick your Champion at least! 🏆"); return; }
  const vals=[f4.champ,f4.run,f4.third,f4.fourth].filter(Boolean);
  if(new Set(vals).size!==vals.length){ alert("Each team can only finish in one position — please fix the duplicate picks."); return; }
  const payload={ name: state.name, type:"final4", final4: f4 };
  const live = SCRIPT_URL && SCRIPT_URL.indexOf("PASTE_")<0;
  if(live){ try{ fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)}).then(function(){},function(){}); }catch(e){} }
  out.value=buildPodiumText();
  document.getElementById("sheetTitle").textContent="Your final four 🏆";
  document.getElementById("sheetHint").innerHTML="Tap <b>Copy</b>, then send to Marco / the family chat. You can change these any time until "+LOCK_LABEL+".";
  modal.classList.add("show");
}

// Players from teams already eliminated as of 7/2/26 (either out in the group stage,
// or knocked out in Round of 32 so far) with 4 or fewer total goals are removed
// (eliminated-team players with 5+ goals are kept). Update counts as the tournament progresses.
const GB_PLAYERS = [
  {name:"Kylian Mbappé",         country:"FRA", goals:6},

  {name:"Erling Haaland",        country:"NOR", goals:5},

  {name:"Ousmane Dembélé",       country:"FRA", goals:4},

  {name:"Folarin Balogun",       country:"USA", goals:3},
  {name:"Matheus Cunha",         country:"BRA", goals:3},
  {name:"Jonathan David",        country:"CAN", goals:3},
  {name:"Johan Manzambi",        country:"SUI", goals:3},
  {name:"Julian Quiñones",       country:"MEX", goals:3},
  {name:"Ismael Saibari",        country:"MAR", goals:3},
  {name:"Marko Arnautovic",      country:"AUT", goals:2},
  {name:"Bradley Barcola",       country:"FRA", goals:2},
  {name:"Jude Bellingham",       country:"ENG", goals:2},
  {name:"Raul Jimenez",          country:"MEX", goals:2},
  {name:"Cyle Larin",            country:"CAN", goals:2},
  {name:"Romelu Lukaku",         country:"BEL", goals:2},
  {name:"Riyad Mahrez",          country:"ALG", goals:2},
  {name:"Mikel Oyarzabal",       country:"ESP", goals:2},
  {name:"Cristiano Ronaldo",     country:"POR", goals:2},
  {name:"Youri Tielemans",       country:"BEL", goals:2},
  {name:"Leandro Trossard",      country:"BEL", goals:2},
  {name:"Ruben Vargas",          country:"SUI", goals:2},
];
if(!state.goldenBoot) state.goldenBoot = {pick1:"", pick2:"", pick3:""};
const GB_LOCK = new Date("2026-07-09T20:00:00Z"); // first QF kickoff: Thu Jul 9 4:00 PM ET
const GB_LOCK_LABEL = "Thu, Jul 9 · 4:00 PM ET (Quarterfinal kickoff)";
function gbPhase(){ return Date.now() >= GB_LOCK.getTime() ? "locked" : "open"; }

const panelGoldenBoot = document.getElementById("panelGoldenBoot");
function renderGoldenBoot(){
  const locked = gbPhase() === "locked";
  const gb = state.goldenBoot;
  const lockNote = locked
    ? ' <span class="soonpill">🔒 LOCKED</span>'
    : ' <span class="openpill">OPEN</span>';
  let html = '<div class="pintro">Pick the tournament\'s <b>top 3 scorers</b> for bonus points! '
    + '🥇 Pick 1 as the exact Golden Boot winner = <b>40 pts</b>. '
    + 'Pick 1 in top 3 (not #1) = <b>10 pts</b>. Pick 2 or 3 as Golden Boot winner = <b>20 pts</b>. '
    + 'Pick 2 or 3 in top 3 = <b>10 pts</b>. Max <b>60 pts</b>. '
    + 'Locks at <b>' + GB_LOCK_LABEL + '</b>.' + lockNote + '</div>';
  [['pick1','🥇 Pick 1 — Golden Boot winner'],['pick2','🥈 Pick 2 — 2nd top scorer'],['pick3','🥉 Pick 3 — 3rd top scorer']].forEach(function(pair){
    const key=pair[0], label=pair[1];
    let opts = '<option value="">— choose a player —</option>';
    GB_PLAYERS.forEach(function(p){
      opts += '<option value="'+p.name+'"'+(p.name===gb[key]?' selected':'')+'>'+p.name+' ('+p.country+') — '+p.goals+'⚽</option>';
    });
    html += '<div class="pcard' + (locked?' lockedrow':'') + '">'
      + '<div class="pl">' + label + '</div>'
      + '<select data-gbkey="' + key + '"' + (locked?' disabled':'') + ' style="width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:15px;font-weight:700;margin-top:6px;box-sizing:border-box;background:#fff">'
      + opts + '</select>'
      + '</div>';
  });
  if(!locked) html += '<button class="btn" id="gbSubmit" style="width:100%;margin-top:8px">Submit Golden Boot picks ✅</button>';
  panelGoldenBoot.innerHTML = html;
  panelGoldenBoot.querySelectorAll("select[data-gbkey]").forEach(function(sel){
    sel.onchange = function(){ state.goldenBoot[sel.dataset.gbkey] = sel.value; save(); };
  });
  const gs = document.getElementById("gbSubmit");
  if(gs) gs.onclick = submitGoldenBoot;
}
function buildGoldenBootText(){
  const gb=state.goldenBoot, who=state.name||"(no name!)";
  return ["⚽ Family WC — Golden Boot Picks — "+who,
    "🥇 Pick 1: "+(gb.pick1||"—"),
    "🥈 Pick 2: "+(gb.pick2||"—"),
    "🥉 Pick 3: "+(gb.pick3||"—")].join("\n");
}
function submitGoldenBoot(){
  if(!state.name){ alert("Pick your name at the top first! 😊"); window.scrollTo({top:0,behavior:"smooth"}); return; }
  const gb = state.goldenBoot;
  if(!gb.pick1){ alert("Enter at least your Pick 1 (Golden Boot winner)! 🥇"); return; }
  const payload = { name: state.name, type:"goldenBoot", goldenBoot: gb };
  const live = SCRIPT_URL && SCRIPT_URL.indexOf("PASTE_")<0;
  if(live){ try{ fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify(payload)}).then(function(){},function(){}); }catch(e){} }
  out.value = buildGoldenBootText();
  document.getElementById("sheetTitle").textContent = "Your Golden Boot picks ⚽";
  document.getElementById("sheetHint").innerHTML = "Tap <b>Copy</b>, then send to Marco / the family chat. You can change these any time until " + GB_LOCK_LABEL + ".";
  modal.classList.add("show");
}

// ===== Tab switching =====
const panelMatches=document.getElementById("panelMatches"), barEl=document.querySelector(".bar");
function setTab(t){
  const m=(t==="matches"), p=(t==="podium"), g=(t==="goldenboot");
  document.getElementById("tabMatches").classList.toggle("active",m);
  document.getElementById("tabPodium").classList.toggle("active",p);
  document.getElementById("tabGoldenBoot").classList.toggle("active",g);
  panelMatches.style.display=m?"":"none";
  panelPodium.style.display=p?"":"none";
  panelGoldenBoot.style.display=g?"":"none";
  barEl.style.display=m?"":"none";
  if(p) renderPodium();
  if(g) renderGoldenBoot();
}
document.getElementById("tabMatches").onclick=()=>setTab("matches");
document.getElementById("tabPodium").onclick=()=>setTab("podium");
document.getElementById("tabGoldenBoot").onclick=()=>setTab("goldenboot");

renderChips(); renderList(); setTab("matches");
loadResults();
// Re-render every 30s so games lock automatically the moment they kick off,
// and so the podium tab flips open/locked at its deadlines without a refresh.
let lastPhase=podiumPhase();
setInterval(function(){
  loadResults();
  const p=podiumPhase();
  if(p!==lastPhase){ lastPhase=p; if(panelPodium.style.display!=="none") renderPodium(); }
}, 30000);
</script>
